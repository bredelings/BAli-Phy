name: Build and test

on:
  push:
    branches:
      - "*"
  pull_request:
    branches:
    - "*"

defaults:
  run:
    shell: bash

jobs:
  build:
    strategy: 
      fail-fast: false
      matrix:
        name: [
               ubuntu-gcc-13-DEBUG_MACHINE,
               ubuntu-gcc-14-sanitize,
               ubuntu-gcc-15-release,
               ubuntu-gcc-15-debugoptimized,
               ubuntu-clang-18-arm-release,
               macos-intel-NDEBUG_DP,
               macos-xcode16-arm-sanitize,
               macos-xcode26-arm-debugoptimized,
               macos-homebrew-llvm-libcxx,
               windows,
               windows-native-mingw
               ]

        include:
          - name: ubuntu-gcc-13-DEBUG_MACHINE
            os: ubuntu-24.04
            compiler: gcc
            version: "13"
            buildtype: "debugoptimized"
            cxxflags: "-DDEBUG_MACHINE=1"
            arch: "linux64"

          - name: ubuntu-gcc-14-sanitize
            os: ubuntu-24.04
            compiler: gcc
            version: "14"
            buildtype: "release"
            sanitize: "address,undefined"
            arch: "linux64"

          - name: ubuntu-gcc-15-release
            os: ubuntu-latest
            compiler: gcc
            version: "15"
            buildtype: "release"
            cxxflags: "-march=x86-64-v3"
            image: ubuntu:25.04
            arch: "linux64"

          - name: ubuntu-gcc-15-debugoptimized  # gcc-15 has new debug checks
            os: ubuntu-latest
            compiler: gcc
            version: "15"
            buildtype: debugoptimized
            image: ubuntu:25.04
            arch: "linux64"

          - name: ubuntu-clang-18-arm-release
            os: ubuntu-24.04-arm
            compiler: clang
            version: "18"
            buildtype: "release"
            arch: "linux64"

          - name: macos-intel-NDEBUG_DP
            os: macos-15-intel
            compiler: xcode
            version: "16"
            buildtype: "debugoptimized"  # test WITH assertions
            cxxflags: "-DNDEBUG_DP"      # but WITHOUT realignment checking code
            arch: "mac-intel64"

          - name: macos-xcode16-arm-sanitize
            os: macos-15
            compiler: xcode
            version: "16"
            buildtype: "release"
            sanitize: "undefined,local-bounds"
            arch: "mac-arm64"

          - name: macos-xcode26-arm-debugoptimized
            os: macos-latest
            compiler: xcode
            version: "26"
            buildtype: "debugoptimized"
            arch: "mac-arm64"

          - name: macos-homebrew-llvm-libcxx
            os: macos-latest
            compiler: llvm
            version: "N/A"
            buildtype: "release"
            arch: "mac-arm64"

          - name: windows
            os: ubuntu-24.04
            compiler: mingw
            version: "N/A"
            buildtype: "release"
            arch: "win64"

          - name: windows-native-mingw
            os: windows-latest
            compiler: mingw
            version: "N/A"
            buildtype: "release"
            arch: "win64"

    runs-on: ${{ matrix.os }}
    container:
      image: ${{ matrix.image || '' }}
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: 3.12

    # Caches for different branches are isolated, so we don't need to put the branch name into the key.
    # The total size for all caches in a repository is 5Gb.

    - name: Use a faster apt mirror
      if: runner.os == 'Linux'
      run: |
        # Use a faster, more reliable mirror
        if [ -n "${{ matrix.image }}" ]  ; then
            sed -i 's|http://archive.ubuntu.com|http://azure.archive.ubuntu.com|g' /etc/apt/sources.list
            sed -i 's|http://archive.ubuntu.com|http://azure.archive.ubuntu.com|g' /etc/apt/sources.list.d/ubuntu.sources
            apt-get update
        else
            sudo sed -i 's|http://archive.ubuntu.com|http://azure.archive.ubuntu.com|g' /etc/apt/sources.list
            sudo sed -i 's|http://archive.ubuntu.com|http://azure.archive.ubuntu.com|g' /etc/apt/sources.list.d/ubuntu.sources
            sudo apt-get update
        fi

    - name: Install (Linux)
      if: runner.os == 'Linux' && matrix.name != 'windows'
      run: |
        # If we're running in a docker image, we are already root
        if [ -n "${{ matrix.image }}" ]  ; then
          apt-get update && apt-get install -y sudo build-essential git cmake
        fi 

        sudo apt-get update
        sudo apt-get install -y pandoc ccache
        sudo apt-get install -y librange-v3-dev libeigen3-dev libcairo2-dev libzstd-dev
        sudo apt-get install -y r-base gnuplot

        if [ "${{ matrix.compiler }}" = "gcc" ] ; then
          echo "Installing g++-${{ matrix.version }}"
          if [ ${{ matrix.os }} = ubuntu-20.04 ] ; then
              # For newer GCCs:
              sudo add-apt-repository ppa:ubuntu-toolchain-r/test
              sudo apt-get update
          fi
          echo sudo apt-get install -y g++-${{ matrix.version }}
          sudo apt-get install -y g++-${{ matrix.version }}
          g++-${{ matrix.version }} --version
          echo "CC=ccache gcc-${{ matrix.version }}" >> $GITHUB_ENV
          echo "CXX=ccache g++-${{ matrix.version }}" >> $GITHUB_ENV
        else
          echo "Installing clang-${{ matrix.version }}"
          sudo apt-get install -y clang-${{ matrix.version }}
          echo "CC=ccache clang-${{ matrix.version }}" >> $GITHUB_ENV
          echo "CXX=ccache clang++-${{ matrix.version }}" >> $GITHUB_ENV
        fi

        sudo rm -rf /usr/local/share/boost
        if [ ${{ matrix.os }} = ubuntu-22.04 ] ; then
            # 22.04 and earlier do not have boost.json
            ( cd
              curl -O -L https://archives.boost.io/release/1.89.0/source/boost_1_89_0.tar.gz
              tar -xzf boost_1_89_0.tar.gz
              cd boost_1_89_0
              ./bootstrap.sh --with-libraries=atomic,chrono,filesystem,system,regex,thread,date_time,program_options,math,serialization,random,json --prefix=../installed-boost-1.89.0
              ./b2 install
              echo -e "\n    BOOST root is at $(cd ../installed-boost-1.89.0; pwd)\n"
              echo BOOST_ROOT=$(cd ../installed-boost-1.89.0; pwd) >> $GITHUB_ENV
            )
        else
            # 24.04 has boost.json
            sudo apt-get install -y libboost-all-dev
        fi

    - name: Install (Linux -> Windows [cross])
      if: matrix.name == 'windows'
      run: |
        # If we're running in a docker image, we are already root
        if [ -n "${{ matrix.image }}" ]  ; then
          apt-get update && apt-get install -y sudo build-essential git cmake wget pkgconf
          echo HOME=/root >> "$GITHUB_ENV"
        fi
        sudo apt-get update
        sudo apt-get install -y pandoc ccache
        sudo apt-get install -y dos2unix g++-mingw-w64 wine64 zstd

    - name: Install (Windows native MinGW)
      if: matrix.name == 'windows-native-mingw'
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        path-type: inherit
        install: >-
          git
          mingw-w64-x86_64-boost
          mingw-w64-x86_64-ccache
          mingw-w64-x86_64-cereal
          mingw-w64-x86_64-eigen3
          mingw-w64-x86_64-fmt
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-meson
          mingw-w64-x86_64-ninja
          mingw-w64-x86_64-pkgconf
          mingw-w64-x86_64-range-v3
          mingw-w64-x86_64-zstd

    - name: Select XCode version (macOS)
      if: runner.os == 'macOS' && matrix.compiler == 'xcode'
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: ${{ matrix.version }}

    - name: Install (macOS)
      if: runner.os == 'macOS'
      run: |
          if [ -n "${{ matrix.sdk }}" ]; then
             export SDKROOT=/Library/Developer/CommandLineTools/SDKs/MacOSX${{ matrix.sdk }}.sdk
             echo "SDKROOT=$SDKROOT" >> $GITHUB_ENV
          fi
          echo "SDKROOT=${SDKROOT}"

          if [ -n "${{ matrix.osx-version-min }}" ] ; then
             MIN="-mmacosx-version-min=${{ matrix.osx-version-min }}"
             echo "CFLAGS=$CFLAGS $MIN"     >> $GITHUB_ENV
             echo "CXXFLAGS=$CXXFLAGS $MIN" >> $GITHUB_ENV
             echo "LDFLAGS=$LDFLAGS $MIN"   >> $GITHUB_ENV
          fi

          export HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK=1 # Don't try and install python3.12
          brew install pandoc ccache coreutils
          brew install eigen range-v3 cairo fmt zstd
          brew install gnuplot r
          if [ "${{ matrix.compiler }}" = "llvm" ] ; then
            brew install llvm
            LLVM_PREFIX="$(brew --prefix llvm)"
            echo "LLVM_PREFIX=${LLVM_PREFIX}" >> $GITHUB_ENV
            echo "CC=ccache ${LLVM_PREFIX}/bin/clang" >> $GITHUB_ENV
            echo "CXX=ccache ${LLVM_PREFIX}/bin/clang++" >> $GITHUB_ENV
            "${LLVM_PREFIX}/bin/clang++" --version
          else
            echo "CC=ccache clang" >> $GITHUB_ENV
            echo "CXX=ccache clang++" >> $GITHUB_ENV
          fi

          brew install boost
          if [[ $(uname -m) == 'arm64' ]] ; then echo "BOOST_ROOT=/opt/homebrew" >> $GITHUB_ENV ; fi
          echo "BOOST_ROOT=${BOOST_ROOT}"

    - name: ccache
      if: matrix.name != 'windows-native-mingw'
      uses: hendrikmuhs/ccache-action@v1.2.23
      with:
         key: ${{ matrix.name }}-${{ github.ref }}
         restore-keys: |
           ${{ matrix.name }}-
         verbose: 2
         append-timestamp: false

    - name: Install meson
      if: matrix.name != 'windows-native-mingw'
      run: |
        python3 -mpip install meson ninja

    - name: Download testiphy test suite
      if: matrix.name != 'windows-native-mingw'
      uses: nick-fields/retry@v4
      with:
        timeout_minutes: 5
        max_attempts: 3
        command: |
          cd
          git clone https://gitlab.com/testiphy/testiphy.git

    - name: Mark installs complete
      run: echo "INSTALLS_COMPLETE=true" >> $GITHUB_ENV

    - name: Make windows sysroot and generate cross file
      if: matrix.name == 'windows'
      # This command also generates the cross file
      run: |
        ${GITHUB_WORKSPACE}/scripts/make_winroot.sh

    - name: Configure
      if: matrix.name != 'windows-native-mingw'
      run: |
        CPPARGS="-g"
        if [ "${{ matrix.cxxflags }}" != "" ] ; then
           CPPARGS="$CPPARGS ${{ matrix.cxxflags }}"
        fi
        if [ "${{ matrix.name }}" = "windows" ] && [ "${{ matrix.arch }}" = "win64" ]; then
           ARGS="${ARGS} --cross-file=win64-cross.txt"
        fi
        if [ "${{ runner.os }}" = "Linux" ] && [ "${{ matrix.name }}" != "windows" ] && [ "${{ matrix.sanitize }}" != "" ] ; then
           # Address sanitizer can't find its dylibs on OS X?
           ARGS="${ARGS} -Db_sanitize=${{ matrix.sanitize }}"
        fi
        echo "SDKROOT = $SDKROOT"
        echo meson setup build --prefix=$HOME/local --buildtype=${{ matrix.buildtype }} -Dcpp_args="$CPPARGS" ${ARGS}
        meson setup build --prefix=$HOME/local --buildtype=${{ matrix.buildtype }} -Dcpp_args="$CPPARGS" ${ARGS}

    - name: Upload meson log if configure failed
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: meson-log-${{ matrix.name }}
        path: ${{ github.workspace }}/build/meson-logs/meson-log.txt

    - name: Build
      if: matrix.name != 'windows-native-mingw'
      run: |
        ccache -p
        ccache -s
        ninja -C build -j4
        meson install -C build --skip-subprojects
        ccache -s

        skip=none
        case "${{ matrix.name }}" in
          *-DEBUG_MACHINE) skip=some ;;
          *-sanitize) skip=most ;;
        esac

        if [ "${skip}" = "none" ] ; then
          if [ -n "${BOOST_ROOT}" ] ; then
              if [ "${{ runner.os }}" == "macOS" ] ; then
                 export DYLD_LIBRARY_PATH="${BOOST_ROOT}/lib"
              else
                 export LD_LIBRARY_PATH="${BOOST_ROOT}/lib"
              fi
          fi
          if [ "${{ matrix.name }}" = "windows" ] ; then
            export WINEPATH=$(winepath -w $HOME/local/bin)
            export MESON_TESTTHREADS=2
          fi
          ninja -C build test -j2
        fi

    - name: Configure (Windows native MinGW)
      if: matrix.name == 'windows-native-mingw'
      shell: msys2 {0}
      run: |
        export CC="ccache gcc"
        export CXX="ccache g++"
        export BOOST_ROOT=/mingw64
        meson setup build --prefix="$PWD/local" --buildtype=${{ matrix.buildtype }} -Dcpp_args="-g"

    - name: Build (Windows native MinGW)
      if: matrix.name == 'windows-native-mingw'
      shell: msys2 {0}
      run: |
        ccache -p
        ccache -s
        ninja -C build -j2
        meson install -C build --skip-subprojects
        ccache -s

    - name: Test (Windows native MinGW)
      if: matrix.name == 'windows-native-mingw'
      shell: msys2 {0}
      run: |
        export PATH="$PWD/local/bin:$PATH"
        meson test -C build --print-errorlogs \
          'bali-phy:bali-phy version' \
          'bali-phy:computation' \
          'bali-phy:bali-phy 5d +A 50' \
          'bali-phy:bali-phy testsuite prob_prog/examples.3/mixture_model'

    - name: Get version
      id: get_version
      run: |
        echo "version=$(echo $GITHUB_REF | cut -d / -f 3)" >> $GITHUB_OUTPUT

    - name: Copy shared libs (Linux)
      if: matrix.arch == 'linux64'
      run: |
        OUTPUT=$HOME/local
        cp $(${CXX} -print-file-name=libstdc++.so.6) $OUTPUT/lib/bali-phy/libstdc++.so.6
        if [ -n "${BOOST_ROOT}" -a -e "${BOOST_ROOT}/lib" ] ; then
            # copy boost shared libs if they exist
            cp ${BOOST_ROOT}/lib/libboost*so* ${OUTPUT}/lib/bali-phy/
        else
            # apparently this only works for system libraries.
            for libname in $(ldd ${OUTPUT}/bin/bali-phy | grep libboost | sed s'/\s*lib\(boost.*\) =>.*/\1/') ; do
                echo cp $($CXX --print-file-name lib${libname}) ${OUTPUT}/lib/bali-phy/
                cp $($CXX --print-file-name lib${libname}) ${OUTPUT}/lib/bali-phy/
            done
        fi
        ldd ${OUTPUT}/bin/bali-phy

    - name: Copy shared libs (Mac)
      if: runner.os == 'macOS'
      run: |
        OUTPUT=$HOME/local

        # copy boost shared libs if they exist
        if [ -n "${BOOST_ROOT}" -a -e "${BOOST_ROOT}/lib" ] ; then
            cp ${BOOST_ROOT}/lib/libboost*dylib* ${OUTPUT}/lib/bali-phy/
        fi

    - name: Ad hoc sign Mac executables
      if: runner.os == 'macOS'
      run: |
        OUTPUT=$HOME/local
        brew install findutils file-formula
        for exe in $(gfind ${OUTPUT} -type f -executable -exec file --mime-type '{}' \; | grep x-mach-binary | sed 's/: application.*//') ; do
           echo codesign --sign - --force --timestamp=none ${exe}
           codesign --sign - --force --timestamp=none ${exe}
        done
        otool -L ${OUTPUT}/bin/bali-phy
        # otool -l ${OUTPUT}/bin/bali-phy
        codesign -d --verbose=4 ${OUTPUT}/bin/bali-phy

    - name: Test
      if: matrix.name != 'windows-native-mingw'
      run: |
        export UBSAN_OPTIONS=halt_on_error=1
        export seed=$RANDOM
        if [ "${{ matrix.name }}" = "windows" ] ; then
          export WINEPATH=$(winepath -w $HOME/local/bin)
          BALIPHY="wine bali-phy"
          STATREPORT="wine statreport"
        else
          export PATH=$HOME/local/bin:$PATH
          BALIPHY=bali-phy
          STATREPORT=statreport
        fi
        echo "Running tests with seed=$seed"

        echo ::group::Basic tests
        ${BALIPHY} help
        cp $HOME/local/share/doc/bali-phy/examples/5S-rRNA/5d-muscle.fasta .
        ${BALIPHY} --seed=$seed 5d-muscle.fasta --test
        ${BALIPHY} --seed=$seed 5d-muscle.fasta --iter=50
        ${BALIPHY} --seed=$(($seed+1)) 5d-muscle.fasta --iter=50
        ${STATREPORT} 5d-muscle-1/C1.log
        if [ "${{ matrix.name }}" != "windows" ] ; then
            bp-analyze 5d-muscle-1 5d-muscle-2
        fi
        ${BALIPHY} --seed=$seed -m tests/prob_prog/demos/airline/Model.hs --test -V4

        # Skip the rest of the tests if this is a DEBUG_MACHINE test.
        skip=none
        case "${{ matrix.name }}" in
          *-DEBUG_MACHINE) skip=some ;;
          *-sanitize) skip=most ;;
        esac

        if [ "$skip" = "none" ] ; then
            echo ::group::Test suite
            cd tests
            ./run-tests.py run . -j2 -- ${BALIPHY} --seed=$seed
            cd
            echo ::endgroup::
        else
            echo ::group::Reduced test suite
            cd tests
            ./run-tests.py run /prob_prog/demos       -j2 -- ${BALIPHY} --seed=$seed
            ./run-tests.py run /prob_prog/coal_mining -j2 -- ${BALIPHY} --seed=$seed
            ./run-tests.py run /prob_prog/cluster     -j2 -- ${BALIPHY} --seed=$seed
            cd
            echo ::endgroup::
        fi

        if [ "$skip" != "most" ] ; then
           cd
           cd testiphy
           rm -rf tests/likelihood/one-sequence

           echo ::group::testiphy variable A
           ./testiphy ${BALIPHY} --seed=$seed
           echo ::endgroup::

             echo ::group::testiphy fixed A
             ./testiphy ${BALIPHY} --seed=$seed -Inone
             echo ::endgroup::
        fi

    - name: Upload tests if they failed
      uses: actions/upload-artifact@v4
      if: failure() && env.INSTALLS_COMPLETE == 'true'
      with:
        name: tests-${{ matrix.name }}
        path: tests

    - name: Get committer email
      if: failure() && env.INSTALLS_COMPLETE == 'true'
      id: get_email
      uses: actions/github-script@v7
      with:
        script: |
          const commit = await github.rest.repos.getCommit({
            owner: context.repo.owner,
            repo: context.repo.repo,
            ref: context.sha
          });
          return commit.data.commit.author.email;
        result-encoding: string

    - name: Email notification for upterm session
      if: failure() && env.INSTALLS_COMPLETE == 'true'
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 465
        username: ${{ secrets.EMAIL_USERNAME }}
        password: ${{ secrets.EMAIL_PASSWORD }}
        subject: "upterm session available: ${{ matrix.name }} on ${{ github.ref_name }}"
        to: ${{ steps.get_email.outputs.result }}
        from: ${{ secrets.EMAIL_USERNAME }}
        body: |
          A build failure triggered an upterm debug session.

          Job: ${{ matrix.name }}
          Branch: ${{ github.ref_name }}
          Commit: ${{ github.sha }}

          Check the Actions log for SSH connection details:
          ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}


    - name: Setup upterm session on failure
      if: failure() && env.INSTALLS_COMPLETE == 'true'
      uses: owenthereal/action-upterm@v1
      with:
        limit-access-to-actor: true
        wait-timeout-minutes: 30
        
